events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name _;

        client_max_body_size 20M;

        set $frontend         http://frontend:80;
        set $product_service  http://product_service:8001;
        set $user_service     http://user_service:8002;
        set $cart_service     http://cart_service:8003;
        set $order_service    http://order_service:8004;
        set $payment_service  http://payment_service:8005;
        set $shipping_service http://shipping_service:8006;
        set $ai_service       http://ai_service:8007;
        set $rag_service      http://rag_service:8008;

        # ─── Product Service ──────────────────────────────────
        location /api/products/ {
            proxy_pass         $product_service;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location /api/categories/ {
            proxy_pass         $product_service;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ─── User / Auth Service ──────────────────────────────
        location /api/auth/ {
            proxy_pass         $user_service;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location /api/users/ {
            proxy_pass         $user_service;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ─── Cart Service ─────────────────────────────────────
        location /api/carts/ {
            proxy_pass         $cart_service;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ─── Order Service ────────────────────────────────────
        location /api/orders/ {
            proxy_pass         $order_service;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ─── Payment Service ──────────────────────────────────
        location /api/payments/ {
            proxy_pass         $payment_service;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ─── Shipping Service ─────────────────────────────────
        location /api/shipping/ {
            proxy_pass         $shipping_service;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ─── RAG Service (Chatbot — hybrid RAG) ──────────────
        # Must be listed before /api/ai/ so nginx matches it first
        location /api/ai/chatbot/ {
            proxy_pass         $rag_service;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # ─── AI Service (Recommendations + Behavior) ─────────
        location /api/ai/ {
            proxy_pass         $ai_service;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # ─── Health check ─────────────────────────────────────
        location /health {
            return 200 '{"status":"ok","gateway":"nginx"}';
            add_header Content-Type application/json;
        }

        # ─── Frontend (catch-all) ──────────────────────────────
        location / {
            proxy_pass         $frontend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
